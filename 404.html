<!--
  GitHub Pages serves this for any unknown path under the site.

  Deliberately script-free and self-contained, for the same reason privacy.html
  is: this page has to work when the app itself is what failed to load. It does
  NOT redirect — the app's routing is hash-based (#/dashboard), so a 404 means a
  genuinely wrong path, and silently bouncing a mistyped URL to the app would
  hide the mistake rather than explain it. Styles are inlined rather than
  pulled from index.css so a stale-cache or path problem cannot leave this page
  unstyled too.
-->

  a.home {

    text-decoration: none;

    font-size: 0.9rem;
  }
  a.home:focus-visible { outline: 3px solid #6d2e3f; outline-offset: 2px; }
  .code { font-family: ui-monospace, Menlo, monospace; font-size: 3rem; color: #6d2e3f; margin: 0; }
</style>
