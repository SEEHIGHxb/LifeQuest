<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Backstop for the innerHTML sinks: even if an unescaped value slipped
       through, no inline/injected script can execute (script-src 'self', no
       'unsafe-inline'). Inline STYLE attributes are used throughout the app, so
       style-src keeps 'unsafe-inline'. Every other directive is 'self' or
       'none': the fonts are vendored, so the app loads nothing off-origin and
       privacy.html's "no third parties" claim is literally true. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Balance Index — Personal Wellbeing Assessment</title>
  <meta name="description" content="Assess your wellbeing across eight life aspects against cited Thai and international benchmarks. Local-first: your answers never leave your device, and there is no account.">
  <meta name="theme-color" content="#24344d">
  <link rel="canonical" href="https://seehighxb.github.io/LifeBalanceIndex/">
  <!-- Link previews. og:image reuses the maskable app icon: it is the only
       image we ship that reads at small sizes, and shipping a dedicated
       1200x630 card would add weight the app itself never loads. -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Life Balance Index">
  <meta property="og:title" content="Life Balance Index — Personal Wellbeing Assessment">
  <meta property="og:description" content="Assess your wellbeing across eight life aspects against cited benchmarks. Local-first, no account.">
  <meta property="og:url" content="https://seehighxb.github.io/LifeBalanceIndex/">
  <meta property="og:image" content="https://seehighxb.github.io/LifeBalanceIndex/assets/icon-512.png">
  <meta name="twitter:card" content="summary">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" href="./assets/icon-192.png">
  <link rel="apple-touch-icon" href="./assets/icon-192.png">
  <!-- Source Serif 4 (headings) + Inter (body) + Sarabun (Thai glyphs),
       vendored under assets/fonts. Self-hosting removes the round-trip to
       Google on every cold load, makes the PWA genuinely offline-capable,
       and means no visitor IP is disclosed to a third party. -->
  <link rel="stylesheet" href="./assets/fonts/fonts.css?v=28">
  <link rel="stylesheet" href="./index.css?v=28">
</head>
<body>
  <div class="app-container">
    <!-- Main Header -->
    <header>
      <div class="brand">
        <h1>Life Balance Index</h1>
        <p>Personal Wellbeing Assessment</p>
      </div>
      <div style="display: flex; gap: 8px; align-items: center;">
        <button id="btn-lang" class="btn" style="font-size: 0.8rem; padding: 4px 10px;" aria-label="Switch language / เปลี่ยนภาษา">ไทย</button>
        <button id="btn-export-data" class="btn" style="font-size: 0.8rem; padding: 4px 10px;">Export</button>
        <button id="btn-import-data" class="btn" style="font-size: 0.8rem; padding: 4px 10px;">Import</button>
        <button id="btn-reset-data" class="btn btn-danger" style="font-size: 0.8rem; padding: 4px 10px;">Reset Data</button>
        <input type="file" id="import-file-input" accept="application/json,.json" class="d-none">
      </div>
    </header>

    <!-- Navigation Tab container -->
    <div id="nav-container" class="nav-tabs d-none" role="tablist" aria-label="Main navigation">
      <button class="tab-btn active" id="tab-dashboard" role="tab" aria-selected="true" aria-controls="main-view" tabindex="0">Overview</button>
      <button class="tab-btn" id="tab-review" role="tab" aria-selected="false" aria-controls="main-view" tabindex="-1">Weekly Review</button>
      <button class="tab-btn" id="tab-quests" role="tab" aria-selected="false" aria-controls="main-view" tabindex="-1">Goals</button>
      <button class="tab-btn" id="tab-leaderboard" role="tab" aria-selected="false" aria-controls="main-view" tabindex="-1">Peer Comparison</button>
    </div>

    <!-- Main View Mount -->
    <main id="main-view" role="tabpanel" tabindex="-1" aria-label="Main content">
      <!-- Injected views go here -->
    </main>

    <!-- Visually-hidden live region: announces the current view to screen
         readers on navigation (finding #12). -->
    <div id="route-announcer" class="sr-only" role="status" aria-live="polite"></div>

    <!-- Floating guidance assistant. The visible bubble is NOT a live region:
         the typewriter effect would stream partial sentences to screen readers
         on every navigation (review finding). Announcements go through the
         hidden #assistant-sr region instead, and only on explicit activation. -->
    <div id="assistant-mount" class="assistant-wrapper d-none">
      <div class="speech-bubble" id="assistant-speech-bubble">
        Loading your recommendations…
      </div>
      <div id="assistant-sr" class="sr-only" role="status" aria-live="polite"></div>
      <img class="assistant-avatar" id="assistant-lumi-avatar" src="./assets/lumi.png?v=28" role="button" tabindex="0" aria-label="Guidance assistant" title="Guidance assistant" alt="Guidance assistant" />
    </div>

    <!-- Footer: privacy/source/version must be reachable from the app itself,
         not only from the GitHub repo (review: PDPA statement was invisible
         to users of the live site). -->
    <footer class="app-footer">
      <a id="footer-privacy" href="./privacy.html">Privacy &amp; Data</a>
      <span aria-hidden="true">·</span>
      <a id="footer-methodology" href="#/methodology">Methodology</a>
      <span aria-hidden="true">·</span>
      <a id="footer-source" href="https://github.com/SEEHIGHxb/LifeBalanceIndex" target="_blank" rel="noopener noreferrer">Source code &amp; license</a>
      <span aria-hidden="true">·</span>
      <span id="footer-version">Version 22</span>
    </footer>
  </div>

  <!-- Core Scripts -->
  <script type="module" src="./app.js?v=28"></script>
</body>
</html>
