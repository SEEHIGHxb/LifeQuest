<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Backstop for the innerHTML sinks: even if an unescaped value slipped
       through, no inline/injected script can execute (script-src 'self', no
       'unsafe-inline'). Inline STYLE attributes are used throughout the app, so
       style-src keeps 'unsafe-inline'; Google Fonts are the only remote origins. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Balance Index — Personal Wellbeing Assessment</title>
  <meta name="theme-color" content="#24344d">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" href="./assets/icon-192.png">
  <link rel="apple-touch-icon" href="./assets/icon-192.png">
  <!-- Source Serif 4 (headings) + Inter (body) + Sarabun (Thai glyphs) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./index.css?v=21">
</head>
<body>
  <div class="app-container">
    <!-- Main Header -->
    <header>
      <div class="brand">
        <h1>Life Balance Index</h1>
        <p>Personal Wellbeing Assessment</p>
      </div>
      <div style="display: flex; gap: 8px; align-items: center;">
        <button id="btn-lang" class="btn" style="font-size: 0.8rem; padding: 4px 10px;" aria-label="Switch language / เปลี่ยนภาษา">ไทย</button>
        <button id="btn-export-data" class="btn" style="font-size: 0.8rem; padding: 4px 10px;">Export</button>
        <button id="btn-import-data" class="btn" style="font-size: 0.8rem; padding: 4px 10px;">Import</button>
        <button id="btn-reset-data" class="btn btn-danger" style="font-size: 0.8rem; padding: 4px 10px;">Reset Data</button>
        <input type="file" id="import-file-input" accept="application/json,.json" class="d-none">
      </div>
    </header>

    <!-- Navigation Tab container -->
    <div id="nav-container" class="nav-tabs d-none" role="tablist" aria-label="Main navigation">
      <button class="tab-btn active" id="tab-dashboard" role="tab" aria-selected="true">Overview</button>
      <button class="tab-btn" id="tab-ledger" role="tab" aria-selected="false">Activity Log</button>
      <button class="tab-btn" id="tab-quests" role="tab" aria-selected="false">Goals</button>
      <button class="tab-btn" id="tab-leaderboard" role="tab" aria-selected="false">Peer Comparison</button>
    </div>

    <!-- Main View Mount -->
    <main id="main-view">
      <!-- Injected views go here -->
    </main>

    <!-- Floating guidance assistant -->
    <div id="assistant-mount" class="assistant-wrapper d-none">
      <div class="speech-bubble" id="assistant-speech-bubble" aria-live="polite">
        Loading your recommendations…
      </div>
      <img class="assistant-avatar" id="assistant-lumi-avatar" src="./assets/lumi.png?v=21" role="button" tabindex="0" aria-label="Guidance assistant" title="Guidance assistant" alt="Guidance assistant" />
    </div>
  </div>

  <!-- Core Scripts -->
  <script type="module" src="./app.js?v=21"></script>
</body>
</html>
