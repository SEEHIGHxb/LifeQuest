name: Benchmark link check

# The app's credibility rests on every score tracing back to a real, citable
# source. Those URLs are government statistics portals and journal articles
# that rot on their own schedule, and a dead citation is invisible to the test
# suite — nothing in `node --test` makes a network call. So check them on a
# schedule rather than discovering it from a user.
#
# This never gates a deploy: link rot is not a reason to block a release, and
# these hosts rate-limit and go down for maintenance. It opens/updates an issue
# instead.

on:
  schedule:
    # 03:00 UTC on the 1st of each month.
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - id: check
        name: Check every cited URL
        run: |
          node --input-type=module -e '
            import { readFileSync, appendFileSync } from "node:fs";

            const src = readFileSync("benchmarks.js", "utf8");
            const urls = [...new Set(
              [...src.matchAll(/url:\s*"(https?:\/\/[^"]+)"/g)].map(m => m[1])
            )];
            console.log(`checking ${urls.length} cited URLs\n`);

            // Some journal/government hosts reject HEAD or bot UAs outright, so
            // fall back to a ranged GET before believing a URL is dead.
            const UA = "Mozilla/5.0 (compatible; LifeBalanceIndex-linkcheck/1.0; +https://github.com/SEEHIGHxb/LifeBalanceIndex)";
            async function probe(url) {
              for (const init of [
                { method: "HEAD", redirect: "follow" },
                { method: "GET", redirect: "follow", headers: { Range: "bytes=0-2048" } }
              ]) {
                try {
                  const res = await fetch(url, {
                    ...init,
                    headers: { "User-Agent": UA, ...(init.headers || {}) },
                    signal: AbortSignal.timeout(30000)
                  });
                  if (res.ok || res.status === 206 || res.status === 403 || res.status === 405) {
                    return { ok: true, status: res.status };
                  }
                  if (init.method === "GET") return { ok: false, status: res.status };
                } catch (e) {
                  if (init.method === "GET") return { ok: false, status: e.name || String(e) };
                }
              }
              return { ok: false, status: "unknown" };
            }

            const dead = [];
            for (const url of urls) {
              const { ok, status } = await probe(url);
              console.log(`${ok ? "ok  " : "DEAD"} ${status}\t${url}`);
              if (!ok) dead.push(`- ${url} (${status})`);
            }

            appendFileSync(process.env.GITHUB_OUTPUT, `dead_count=${dead.length}\n`);
            appendFileSync(
              process.env.GITHUB_OUTPUT,
              `dead_list<<EOF\n${dead.join("\n")}\nEOF\n`
            );
            console.log(`\n${dead.length} of ${urls.length} unreachable`);
          '

      - name: Open or update an issue when citations rot
        if: steps.check.outputs.dead_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              'The scheduled citation check could not reach these benchmark sources:',
              '',
              `${{ steps.check.outputs.dead_list }}`,
              '',
              'Each backs a score the app shows to users, so a dead link is a',
              'claim we can no longer support. Replace the URL, or cite an',
              'archived copy.',
              '',
              `_Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}_`
            ].join('\n');
            const title = 'Benchmark citations unreachable';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'link-rot'
            });
            if (existing.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['link-rot']
              });
            }
